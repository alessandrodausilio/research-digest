<script>
const ARTICLES = [{"title": "Motor cortex somatostatin interneurons adaptively shape the structure of action sequences.", "abstract": "The brain flexibly reorganizes action sequences to optimize behavioral outcomes through reinforcement learning and adaptive motor control. Although the primary motor cortex (M1) is essential for skill learning and dexterous movement, how cortical microcircuits refine the timing and structure of action sequences remains unclear. We show that M1 somatostatin interneurons (SST-Ins) display synchronized, action-locked calcium activity during acquisition of a lever-press task in freely moving mice, in contrast to the sequential activation of pyramidal neurons. Following extended training under a stable task schedule, SST-IN activity was no longer coupled to action execution. However, when task demands were modified to require faster and more temporally constrained action sequences, SST-IN activity redistributed and correlated with trial-by-trial changes in sequences, rather than diminishing. Inhibition of SST-INs disrupted temporal organization and impaired efficient motor execution. These findings highlight the unexpected role of M1 SST-INs in refining motor programs into more efficient and task-specific structures.", "journal": "Nature communications", "year": "2026", "month": "Mar", "authors": ["Lee J.", "Bariselli S.", "Sitzia G."], "doi": "10.1038/s41467-026-70353-y", "source": "PubMed", "url": "https://doi.org/10.1038/s41467-026-70353-y", "score": 45, "matched_keywords": ["motor control", "motor cortex"]}, {"title": "Proprioceptive integration in motor control.", "abstract": "Muscle vibration alters both perceived limb position and velocity by increasing muscle spindle afferent firing rates. In particular the type Ia afferents are affected, which mainly encode muscle stretch velocity. Predictive frameworks of sensorimotor control, such as Active Inference and Optimal Feedback Control, suggest that velocity signals should inform position estimates. Such a function would predict that errors in perceived limb position and velocity should be correlated, but this prediction remains empirically underexplored. We hypothesised that an online evaluation of the integral of sensed velocity influences the perceived arm position during active movements. Using a virtual reality-based reaching task we investigated how vibration-biased proprioceptive feedback influences voluntary movement control and inference of arm position and movement. Our results suggest that muscle vibration biases perceived movement velocity, with downstream effects on perceived limb position and reflexive corrections of movement speed. We found that (i) antagonist vibration during active movement caused participants to overestimate their movement speed while also slowing down, (ii) movement speed and endpoint errors were correlated, with muscle vibration affecting both in congruent directions and (iii) adjustments in movement speed to muscle vibration are sufficiently fast to be reflexive. Together these findings support the hypothesis that proprioceptive velocity signals are integrated to augment inference of position, consistent with predictive frameworks of sensorimotor control. KEY POINTS: During movement without visual feedback, the central nervous system (CNS) has access to both position- and velocity-based proprioceptive signals, which are used to estimate limb state. Muscle vibration biases the perception of limb position, as seen in the classically observed pattern of biased endpoint errors, through the stimulation of primary (type Ia) muscle spindles, primarily a velocity sensor. We investigated how proprioceptive velocity signals affect position estimation during movement by applying muscle vibration while measuring perceived movement speed, actual movement speed and endpoint errors in a virtual reality (VR)-based reaching task. We show that errors in perceived limb position and velocity are correlated during active movements, consistent with predictive frameworks of sensorimotor control. These findings support the idea that the CNS maintains a self-consistent estimate of limb state across both position and velocity domains.", "journal": "The Journal of physiology", "year": "2026", "month": "Mar", "authors": ["Mortensen E.", "Christensen M."], "doi": "10.1113/JP289835", "source": "PubMed", "url": "https://doi.org/10.1113/JP289835", "score": 43, "matched_keywords": ["motor control"]}, {"title": "Resistance training tempo selectively modulates corticospinal and reticulospinal excitability in humans.", "abstract": "The neural mechanisms underlying resistance training (RT) adaptations remain incompletely understood, particularly the contribution of cortico-reticular and reticulospinal tracts (RSTs), which have rarely been examined in humans. One factor that may critically shape these adaptations is training pace, an overlooked yet physiologically relevant variable, as externally paced and self-paced contractions impose distinct demands on cortical and subcortical motor circuits. This study examined (1) how RT affects RST excitability and (2) whether different types of RT produce distinct changes in descending motor pathway excitability. Thirty healthy participants were randomized to metronome-paced RT (MP-RT), self-paced RT (SP-RT) or control. Cortical and corticospinal excitability were assessed with transcranial magnetic stimulation, while cortico-reticulospinal and RST excitability were measured using the ipsilateral to contralateral motor-evoked potential amplitude ratio (ICAR) and the StartReact effect. Training consisted of dumbbell exercises performed three times weekly for three weeks, with repeated neurophysiological testing. Both RT protocols improved one-repetition maximum and maximal voluntary force (P < 0.001). SP-RT resulted in greater increases in the StartReact effect (P < 0.001), rate of force development (0.0453) and cortico-reticulospinal excitability (ICAR; P = 0.0351), whereas MP-RT elicited larger increases in corticospinal excitability (P = 0.00420) and greater reductions in short-interval intracortical inhibition (P < 0.001). This study provides the first evidence in humans that RT modifies cortico-reticular and RST excitability. Importantly, adaptations were pacing-dependent: SP-RT selectively targets cortico-reticular circuit and RST, whereas MP-RT engaged corticospinal and inhibitory intracortical circuits. This pathway-specific plasticity underscores training modality as critical determinant of neural adaptation, with implications for rehabilitation and performance. KEY POINTS: This study examined the effects of resistance training (RT) on descending motor pathways using transcranial magnetic stimulation and the StartReact protocol. Given the inaccessibility of the reticulospinal tract in humans, its excitability was inferred indirectly via the StartReact effect and ipsilateral to contralateral MEP amplitude ratio (ICAR), offering novel insight into cortico-reticulospinal modulation. Both metronome-paced and self-paced RT increased muscle strength but induced distinct neural adaptations. Self-paced RT engaged cortico-reticular and reticulospinal pathways, as indicated by elevated ICAR and StartReact effect values, while metronome-paced RT increased corticospinal excitability and reduced intracortical inhibition. These findings demonstrate, for the first time in humans, that RT pacing can differentially modulate corticospinal and reticulospinal excitability, two parallel descending motor systems with distinct roles. This selective pathway engagement suggests that training tempo is not merely behavioural but a physiologically meaningful factor for directing neuroplasticity.", "journal": "The Journal of physiology", "year": "2026", "month": "Mar", "authors": ["Akalu Y.", "Tallent J.", "Frazer A."], "doi": "10.1113/JP289141", "source": "PubMed", "url": "https://doi.org/10.1113/JP289141", "score": 37, "matched_keywords": ["transcranial magnetic stimulation"]}, {"title": "Whole-brain efferent projections of glutamatergic neurons in the cingulate cortex of mice.", "abstract": "The cingulate cortex, on the medial cerebral hemisphere, is involved in cognitive processing, emotional regulation, nociception, voluntary motor control, and sleep modulation. Anatomically, the cingulate cortex is organized into three distinct subdivisions: anterior cingulate cortex (ACC, A24a/A24b), midcingulate cortex (MCC, A24a'/A24b'), and posterior cingulate cortex (PCC, A30/A29c). Although emerging evidence from rodent models has mapped cingulate cortical projections, a comprehensive characterization of whole-brain efferent pathways from glutamatergic neurons in adult mice remains incomplete. In the present investigation, we applied a homologous nomenclature system and utilized viral anterograde tracing techniques, integrating both coronal and sagittal fluorescence imaging modalities, to systematically map and reconstruct the comprehensive efferent projections of glutamatergic neurons in the ACC, MCC, and PCC of adult mice. The findings revealed that the ACC, MCC, and PCC share a conserved projection architecture with direct efferent connections to key brain regions such as the intra-cingulate cortex, cerebral cortex, subcortical telencephalon, thalamus, and brainstem. Furthermore, our analysis revealed significant heterogeneity in the spatial distribution of efferent projections among cingulate subregions. Each subregion of the cingulate cortex exhibited distinct neuroanatomical connectivity patterns, which were posited to mediate their specialized functional roles. Neuroanatomical findings provided a fundamental basis for subsequent investigations into the functional roles of glutamatergic neurons in the cingulate cortex. Moreover, these findings provided a detailed structural framework that facilitated the elucidation of neural mechanisms underlying specific physiological processes.", "journal": "Molecular brain", "year": "2026", "month": "Mar", "authors": ["Shi F.", "Lei L.", "Qiu J."], "doi": "10.1186/s13041-026-01290-6", "source": "PubMed", "url": "https://doi.org/10.1186/s13041-026-01290-6", "score": 37, "matched_keywords": ["motor control"]}, {"title": "Testosterone modulates multispectral oscillatory activity serving performance of motor sequences in typically developing youth.", "abstract": "Motor control is critical to daily functioning and undergoes significant refinement throughout youth. Although the effects of age on the underlying brain circuitry have been well characterized, fewer studies have examined the influence of pubertal factors on this maturation. This distinction is crucial, as an increase in hormones like testosterone may be a better predictor of neural development than age alone and thus more informative in understanding the functional changes observed during youth. To this end, we enrolled 69 typically developing participants (10-17 years old) who performed a motor sequencing task during magnetoencephalography (MEG) and provided saliva samples for testosterone assays. The neural oscillations serving motor control were imaged and examined using whole-brain ANCOVAs with sex and testosterone levels as factors of interest, controlling for age. Our key findings indicated sex-specific effects of testosterone, such that increasing testosterone levels in males, but not females, were associated with weaker beta oscillations in the prefrontal cortex. Increasing testosterone levels were also associated with weaker alpha oscillations across boys and girls in several frontal and inferior parietal regions. Additionally, there were sex-specific effects of testosterone on motor-related gamma oscillations in cerebellar regions, such that increasing testosterone was correlated with stronger activity in males only. Finally, neural responses in several of these regions were significantly coupled with reaction time. These findings suggest that testosterone has important effects on motor-related neurophysiology above and beyond age, and that these changes may serve the functional refinement of motor sequencing during this developmental period. KEY POINTS: The transition from childhood to adolescence is a critical period for brain development and is characterized by improvements in motor performance and increases in levels of pubertal hormone such as testosterone. Previous studies have shown that movement-related neural oscillations in extended motor regions undergo functional refinement during this period, but whether these changes are coupled to developmental increases in testosterone remains unclear. Herein, magnetoencephalography was used to derive whole-brain functional maps of movement-related oscillations during a motor sequencing task in 69 typically-developing youth, who also provided a sample for assaying testosterone. Testosterone levels, controlling for age, were coupled in a sex-specific way to neural oscillatory responses in higher-order brain regions serving motor planning and execution, with activity in several of these regions being correlated with behavioural performance. These findings suggest that testosterone plays a critical role in the maturation of higher-order motor circuitry during the pubertal transition period.", "journal": "The Journal of physiology", "year": "2026", "month": "Mar", "authors": ["Derby J.", "Ward T.", "Petro N."], "doi": "10.1113/JP289314", "source": "PubMed", "url": "https://doi.org/10.1113/JP289314", "score": 37, "matched_keywords": ["motor control"]}, {"title": "The dual diversity crisis in physiology.", "abstract": "", "journal": "The Journal of physiology", "year": "2026", "month": "Mar", "authors": ["Rudroff T."], "doi": "10.1113/JP290947", "source": "PubMed", "url": "https://doi.org/10.1113/JP290947", "score": 35, "matched_keywords": []}, {"title": "A Distinct Layer 1 Astrocyte Program Shapes Perisynaptic Structure and Calcium Signaling in Mouse Motor Cortex", "abstract": "Although layer-specific molecular and morphological diversity among cortical astrocytes is increasingly well established, how these distinct states are linked to specialized calcium signaling and maintained in the adult cortex remains unclear. Here, combining super-resolution structural imaging, two-photon calcium imaging, and analysis of public single- cell and spatial transcriptomic resources, we identify Layer 1 (L1) astrocytes in mouse primary motor cortex as a distinct superficial astrocyte program. These cells occupy compact territories yet contain dense synapse associated loop-like structures and display frequent, fast, broadly spreading calcium events that engage a large fraction of the territory. Transcriptomic analyses identify Id1 and Id3 as enriched components of this superficial program. CRISPR-Cas9 deletion of Id1 and Id3 in adult astrocytes selectively disrupts L1 and superficial Layer 2/3 (L2/3) astrocytes, expanding territory size, reducing fine process complexity, and suppressing calcium activity. Thus, adult layer-specific transcriptional programs maintain specialized astrocyte structure and signaling.", "journal": "bioRxiv", "year": "2026", "month": "03", "authors": ["Bhattacharjee, S.", "Yeh, K.-H.", "Wu, P.-Y."], "doi": "10.64898/2026.03.16.712002", "source": "bioRxiv preprint", "url": "https://doi.org/10.64898/2026.03.16.712002", "matched_keywords": ["motor cortex"], "score": 23}, {"title": "Focal Transcranial Magnetic Stimulation of the Rat Anterior Cingulate Cortex Inhibits Incubation of Opioid Craving after Voluntary Abstinence.", "abstract": "Relapse remains a major challenge in opioid addiction treatment, underscoring the need for innovative therapies. Progress in neuromodulation therapies has been limited by insufficient mechanistic understanding of stimulation engagement and disease-related changes in the brain. We used a novel, focal transcranial magnetic stimulation (TMS) system to deliver high-density theta burst stimulation (hdTBS) combined with resting-state fMRI to test whether anterior cingulate cortex (ACC) stimulation reduces relapse-like behavior and alters functional circuitry in a rodent model of opiate dependence. The coil focality and stimulation parameters approximate human TMS protocols, and the targeted region represents a functional homolog of the human ACC. We trained rats to self-administer oxycodone intravenously for 14 days. We then introduced an electric barrier for 13 days, which caused cessation of drug self-administration. We assessed relapse to oxycodone seeking immediately after training (early abstinence) and after electric-barrier exposure (late abstinence). We administered daily hdTBS or sham stimulation for 7 days before the late-abstinence test. Sham-treated rats showed a time-dependent increase in oxycodone seeking during abstinence (incubation of oxycodone craving) and reduced ACC functional connectivity. In contrast, hdTBS prevented the incubation of oxycodone craving and restored ACC connectivity with the dorsal and ventral striatum. Tracer-based axonal-projection data further showed that stimulation-induced effects aligned with regions receiving dense projections from the stimulation site, suggesting that the projection architecture is critical to the propagation of focal stimulation across distributed networks. These findings identify ACC-centered circuits as mechanistically informed targets for TMS-based interventions that aim to reduce opioid relapse during abstinence. Prefrontal TMS stimulation reduced relapse-like behavior and restored corticostriatal circuits, highlighting translational targets for addiction treatment.", "journal": "bioRxiv : the preprint server for biology", "year": "2026", "month": "Mar", "authors": ["Ma Z.", "Duan Y.", "Nguyen H."], "doi": "10.64898/2026.03.04.709400", "source": "PubMed", "url": "https://doi.org/10.64898/2026.03.04.709400", "score": 18, "matched_keywords": ["transcranial magnetic stimulation"]}, {"title": "Functional reorganization of motor cortex connectivity during learning.", "abstract": "Learning new tasks requires the brain to reshape the flow of neural activity, but how these changes arise from dynamic neural connectivity remains unclear. Here, we used two-photon photostimulation and calcium imaging to map learning-related changes in connectivity in layer 2/3 of mouse motor cortex, induced by learning of an optical brain-computer interface (BCI) task. Mice rapidly (within minutes) learned to change activity in a conditioned neuron to earn rewards. Activity changes were sparse; the conditioned neuron increased activity more than surrounding neurons. Mapping connectivity before and after learning revealed changes in motor cortex connectivity, enriched in neurons that were active before trial initiation, analogous to motor cortex populations that are active preceding movement. Motor cortex plasticity reroutes preparatory activity to neurons that are active later and control the conditioned neuron. Our findings show how rapid learning can be achieved through structured changes in motor cortex connectivity.", "journal": "bioRxiv : the preprint server for biology", "year": "2026", "month": "Mar", "authors": ["Daie K.", "Aitken K.", "Rózsa M."], "doi": "10.64898/2026.03.03.709199", "source": "PubMed", "url": "https://doi.org/10.64898/2026.03.03.709199", "score": 18, "matched_keywords": ["motor cortex"]}, {"title": "Effectiveness of transcranial magnetic stimulation on gait and spasticity in people with spinal cord injury: a systematic review and meta-analysis.", "abstract": "Systematic review and meta-analysis. To determine the effectiveness of transcranial magnetic stimulation (TMS) in improving gait velocity and spasticity in people with spinal cord injury (SCI). Studies included in the review were conducted in various countries; the review was carried out in Spain. A systematic review with meta-analysis was conducted by searching for randomized controlled trials published up to November 2024 comparing the application of TMS with a sham group. Outcome variables were gait velocity and spasticity, measured with the 10 m walking test and the Modified Ashworth Scale (MAS) respectively. PubMed, Cochrane Central Register of Controlled Trials, Web of Science, CINAHL and PEDro databases were consulted. Fourteen studies were included in the qualitative analysis and twelve in the quantitative analysis, involving 235 participants with SCI. No significant differences were detected for the effect of TMS on gait velocity (SMD = -0.71; 95%CI: -1.62 to 0.20). However, TMS produced a significant decrease in MAS compared to the control group (MD = -0.56 points; 95%CI: -0.82 to -0.30). Although the subgroup analysis based on the number of pulses showed no significant differences between applications of <1000 and ≥1000 pulses, the ≥1000 pulses subgroup showed significant differences (MD = -0.56 points; 95%CI: -0.83 to -0.30) favoring the experimental group, while the <1000 pulses subgroup showed no significant differences (MD = -0.35 points; 95%CI: -2.03 to 1.34). TMS is effective in improving spasticity in people with SCI with low certainty of evidence. However, TMS has not demonstrated a significant effect on gait velocity, with very low certainty of evidence. Further studies comparing the number of pulses and their effectiveness are warranted to elucidate the findings of this meta-analysis.", "journal": "Spinal cord", "year": "2026", "month": "Mar", "authors": ["Valera-Sapena F.", "Bravo-Aparicio J.", "Serrano-Muñoz D."], "doi": "10.1038/s41393-026-01193-2", "source": "PubMed", "url": "https://doi.org/10.1038/s41393-026-01193-2", "score": 18, "matched_keywords": ["transcranial magnetic stimulation"]}, {"title": "Features of Mitochondrial Dynamics Changes in Large Pyramidal Neurons of the Human Motor Cortex during Aging.", "abstract": "Brain aging is a physiological process characterized by various neurodegenerative manifestations, largely driven by mitochondrial dysfunctions, including changes in mitochondrial metabolism and dynamics. Conflicting reports in the literature regarding mitochondrial fusion and fission in the human cerebral cortex during aging underscore the need to elucidate the mechanisms of this dysfunction. The aim of this study was to assess features of mitochondrial dynamics in the large pyramidal neurons of the human motor cortex during aging. The study was conducted on autopsy material from the motor cortex of individuals aged 75 years and older. The control group consisted of similar material from individuals aged 35-44 years who died from sudden cardiac death. Intensity of immunohistochemical staining for TOMM20, Drp1, Mfn1, Mfn2, and Opa1 proteins in the large pyramidal neurons of the human motor cortex was evaluated. Decrease in the staining intensity of TOMM20 and Opa1 markers and increase in the staining intensity of the Drp1 marker were observed, indicating enhanced mitochondrial fragmentation in the pyramidal neurons of layer V of the motor cortex, possibly associated with reduction in the mitochondrial pool volume due to dysfunction in the mitochondrial fusion process, which impedes organelle growth.", "journal": "Biochemistry. Biokhimiia", "year": "2026", "month": "Feb", "authors": ["Baranich T.", "Voronkov D.", "Okulova K."], "doi": "10.1134/S0006297925604447", "source": "PubMed", "url": "https://doi.org/10.1134/S0006297925604447", "score": 18, "matched_keywords": ["motor cortex"]}, {"title": "Phonetic variability leads to gradient speech perception.", "abstract": "Speech sounds are based on categories, but listeners are also sensitive to within-category acoustic variation. This", "journal": "Journal of experimental psychology. Human perception and performance", "year": "2026", "month": "Mar", "authors": ["Gür E.", "McMurray B."], "doi": "10.1037/xhp0001411", "source": "PubMed", "url": "https://doi.org/10.1037/xhp0001411", "score": 18, "matched_keywords": ["speech perception"]}, {"title": "Effects of repetitive transcranial magnetic stimulation on electroencephalographical measures of poststroke upper limb dysfunction: study protocol for a randomized controlled trial.", "abstract": "Patients with stroke would experience upper limb dysfunction, leading to functional impairments in daily living and placing a burden on society and families. Repetitive transcranial magnetic stimulation (rTMS), a noninvasive neuromodulation tool, has been shown to upper limb dysfunction. However, the clinical efficacy and the underlying neurophysiological mechanisms of optimal intensity of rTMS to promote motor recovery of stroke patients with upper limb function need further investigations. This study aims to investigate the changes in the brain neurophysiological mechanisms ranging from cortical oscillatory activity to the effectiveness of the complex network after low-frequency (LF) and high-frequency (HF) rTMS on motor areas of patient post-stroke. A total of 42 stroke patients with upper limb dysfunction will be randomized into high-frequency (HF) rTMS group and low-frequency (LF) rTMS group (1:1 ratio). The HF-rTMS group will use 90% resting motor threshold (RMT), 10 Hz acting with the ipsilesional M1 for a total of 1500 pulses for 2 weeks, and the LF-rTMS group acting on the contralesional M1 with the same parameters, except that 1 Hz is used. The National Institutes of Health Stroke Scale (NIHSS), the motor deficit (the Fugl-Meyer Assessment Upper Extremity (FMA-UE)), Modified Barthel Index (MBI), and resting-state electroencephalogram (EEG) signals will be obtained at the baseline and within 1 week after the rTMS. This study will contribute to the understanding of the neurophysiological changes in the brain corresponding to the clinical effects of HF- and LF-rTMS in patients with stroke. ChiCTR2200065639. Registered in November 2022.", "journal": "Trials", "year": "2026", "month": "Mar", "authors": ["Chen B.", "Wu H.", "Chan S."], "doi": "10.1186/s13063-026-09627-1", "source": "PubMed", "url": "https://doi.org/10.1186/s13063-026-09627-1", "score": 18, "matched_keywords": ["transcranial magnetic stimulation"]}, {"title": "Dyad practice facilitates motor learning in music.", "abstract": "", "journal": "Scientific reports", "year": "2026", "month": "Mar", "authors": ["Loria T.", "Tian G.", "Karlinsky A."], "doi": "10.1038/s41598-026-43485-w", "source": "PubMed", "url": "https://doi.org/10.1038/s41598-026-43485-w", "score": 18, "matched_keywords": ["motor learning"]}, {"title": "Traveling waves support rhythmic attentional search", "abstract": "Brain activity unfolds across space and time, giving rise to spatiotemporal dynamics that can manifest as cortical traveling waves -smooth phase shifts propagating across the cortex. Although traveling waves have been observed across species and measurement scales, their functional role in human cognition remains largely inferred from correlational evidence. In healthy humans, large-scale neural dynamics must be studied non-invasively, which provides limited access to their neural origins. Here, we tested whether global traveling waves causally contribute to inter-areal communication during attention. Using transcranial magnetic stimulation (TMS), we induced long-range traveling waves detectable with electroencephalography and assessed their neural and behavioral consequences during a difficult attentional search task. Double-pulse TMS applied over the right frontal eye field transiently disrupted ongoing global waves and selectively induced direction- and frequency-specific traveling waves propagating toward the occipital visual cortex. These TMS-induced anterior-to-posterior theta traveling waves were periodically modulated by stimulation latency relative to search-trial onset. Critically, behavioral performance exhibited the same rhythmic pattern, with improved attentional search performance when TMS-induced traveling waves were more prominent. Together, these findings provide causal evidence that large-scale traveling waves support inter-areal communication during rhythmic visual attention.", "journal": "bioRxiv", "year": "2026", "month": "03", "authors": ["Kong, Y.", "Petras, K.", "Marque, P."], "doi": "10.64898/2026.03.16.712044", "source": "bioRxiv preprint", "url": "https://doi.org/10.64898/2026.03.16.712044", "matched_keywords": ["transcranial magnetic stimulation"], "score": 17}, {"title": "In vivo motor unit decoding and in vitro cellular characterisation of spinal circuits for urination in adult mice", "abstract": "Urinary dysfunction affects billions of individuals worldwide; however, the fundamental cellular and circuit properties that govern perineal motor control remain largely unknown, serving as a functional black box. Here, we describe several methods that, when used in concert, characterise cellular, synaptic, and motor unit properties underlying the control of urination in adult mice. High-density electromyography combined with real-time cystometry were used to study external urethral sphincter (EUS) motor units, which follow a hierarchical (onion skin) recruitment pattern during bladder filling. The transition to the voiding phase is marked by inhibition, followed by synchronised bursts. Furthermore, through concurrent recordings of ischiocavernosus (IC) muscles, the relationship between IC and EUS motor units could be studied to look for shared common inputs that could shed light on circuitry. Whole-cell patch-clamp recordings from retrogradely identified neurons revealed a fundamental biophysical divergence: urinary parasympathetic preganglionic neurons (PPGN) are significantly smaller and more excitable than somatic EUS and IC motoneurons and lack the recurrent excitatory and inhibitory circuits present in both EUS and IC motor pools. Finally, using a novel pressure-clamp preparation, we showed that acute tibial nerve stimulation (a widely used treatment for urinary dysfunction) evokes short-latency inhibition of EUS moto const TODAY = "2026-03-18";
const REPO = "alessandrodausilio/research-digest";
const GH_PAT = "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";
const ratings = {};

function renderArticles() {
  const container = document.getElementById('articles-container');
  container.innerHTML = ARTICLES.map((a, i) => `
    <div class="article" id="art-${i}">
      <div class="article-num">Article ${i+1} of ${len(articles)} · Score: ${a.score}/100</div>
      <div class="article-title">
        <a href="${a.url}" target="_blank">${escHtml(a.title)}</a>
        <span class="source-badge ${a.source === 'PubMed' ? 'pubmed' : ''}">${a.source}</span>
      </div>
      <div class="article-meta">
        ${a.authors.slice(0,3).join(', ')}${a.authors.length > 3 ? ' et al.' : ''}
        &nbsp;|&nbsp; <em>${escHtml(a.journal)}</em> ${a.year}
      </div>
      ${a.matched_keywords.length ? `<div class="keywords">${a.matched_keywords.map(k => `<span>${k}</span>`).join('')}</div>` : ''}
      <div class="article-abstract">${escHtml(a.abstract.slice(0, 400))}${a.abstract.length > 400 ? '…' : ''}</div>
      <div class="rating-row">
        <span class="rating-label">Rating:</span>
        <div class="stars star-group" id="stars-${i}">
          ${[1,2,3,4,5].map(n => `<span class="star" data-i="${i}" data-v="${n}" onclick="rate(${i},${n})">★</span>`).join('')}
        </div>
        <span id="label-${i}" style="font-size:13px;color:var(--muted);margin-left:8px;"></span>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const LABELS = ['','Not relevant','Slightly interesting','Interesting','Very interesting','Must read'];

function rate(i, v) {
  ratings[i] = v;
  const stars = document.querySelectorAll(`#stars-${i} .star`);
  stars.forEach((s, idx) => s.classList.toggle('active', idx < v));
  document.getElementById(`label-${i}`).textContent = LABELS[v];
  document.getElementById(`art-${i}`).classList.toggle('rated', v >= 3);
  updateProgress();
}

function updateProgress() {
  const n = Object.keys(ratings).length;
  document.getElementById('progress-text').textContent = `${n} of ${ARTICLES.length} rated`;
}

async function submitRatings() {
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Saving ratings...';
  
  const payload = ARTICLES.map((a, i) => ({
    doi: a.doi, title: a.title, journal: a.journal, year: a.year,
    authors: a.authors, url: a.url, source: a.source,
    score: a.score, rating: ratings[i] || null,
    in_digest: (ratings[i] || 0) >= 3
  }));
  
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const filePath = `data/ratings/${TODAY}.json`;
  
  try {
    // Check if file exists (to get sha for update)
    let sha = null;
    const checkResp = await fetch(
      `https://api.github.com/repos/${REPO}/contents/${filePath}`,
      { headers: { 'Authorization': `token ${GH_PAT}`, 'Accept': 'application/vnd.github.v3+json' } }
    );
    if (checkResp.ok) {
      const existing = await checkResp.json();
      sha = existing.sha;
    }
    
    const body = { message: `ratings: ${TODAY}`, content, branch: 'main' };
    if (sha) body.sha = sha;
    
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/contents/${filePath}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GH_PAT}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }
    );
    
    if (resp.ok) {
      status.innerHTML = '✅ Ratings saved! Articles rated ≥3 will appear in Monday's digest.';
      btn.textContent = 'Saved ✓';
    } else {
      const err = await resp.json();
      status.textContent = `Error: ${err.message}`;
      btn.disabled = false;
    }
  } catch(e) {
    status.textContent = `Error: ${e.message}`;
    btn.disabled = false;
  }
}

renderArticles();
</script>
