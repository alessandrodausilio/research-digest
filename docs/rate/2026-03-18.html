<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Research Digest 2026-03-18</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#fff;--fg:#1a1a1a;--mu:#666;--bo:#e0e0e0;--ac:#2c5f8a;--son:#f0a500;--sof:#ccc}@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--fg:#e8e8e8;--mu:#999;--bo:#333;--ac:#5a9fd4;--son:#f0c040;--sof:#444}}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);max-width:800px;margin:0 auto;padding:24px 16px}h1{font-size:22px;font-weight:600;color:var(--ac);margin-bottom:4px}.sub{font-size:14px;color:var(--mu);margin-bottom:24px}.card{border:1px solid var(--bo);border-radius:10px;padding:18px;margin-bottom:16px}.card.ok{border-color:#4caf50;background:#f0f7ed}.num{font-size:12px;color:var(--mu);margin-bottom:4px}.ttl{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:6px}.ttl a{color:var(--ac);text-decoration:none}.ttl a:hover{text-decoration:underline}.meta{font-size:13px;color:var(--mu);margin-bottom:10px}.kws{font-size:12px;color:var(--mu);margin-bottom:12px}.kw{background:#f5f5f5;border:1px solid var(--bo);border-radius:4px;padding:2px 7px;margin-right:5px;display:inline-block;margin-bottom:4px}.abs{font-size:14px;line-height:1.6;margin-bottom:14px}.bdg{font-size:11px;padding:2px 7px;border-radius:4px;margin-left:8px;background:#fff3cd;color:#856404;border:1px solid #ffc107}.bdg.pm{background:#d1e7ff;color:#084298;border-color:#9ec5fe}.stars{display:flex;gap:6px;align-items:center;margin-top:8px}.star{font-size:28px;cursor:pointer;color:var(--sof);user-select:none}.star.on{color:var(--son)}.rlbl{font-size:13px;color:var(--mu);margin-left:8px}.foot{margin-top:32px;text-align:center}#btn{background:var(--ac);color:#fff;border:none;padding:14px 40px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;display:none}#btn:disabled{opacity:0.5;cursor:not-allowed}#st{margin-top:14px;font-size:14px;color:var(--mu);min-height:20px}#msg{text-align:center;padding:40px;color:var(--mu)}</style></head><body><h1>Research Digest - Rate Articles</h1><div class='sub'>2026-03-18 | <span id='prog'>Loading...</span></div><div id='msg'>Loading articles...</div><div id='arts'></div><div class='foot'><button id='btn' onclick='submitRatings()'>Submit ratings and save</button><div id='st'></div></div><script>var DATE='2026-03-18';var REPO='alessandrodausilio/research-digest';var PAT='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';var THR=3;var ARTS=[];var ratings={};var LABELS=['','Not relevant','Slightly interesting','Interesting','Very interesting','Must read'];function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}function render(){var o='';for(var i=0;i<ARTS.length;i++){var a=ARTS[i];var au=a.authors.slice(0,3).join(', ')+(a.authors.length>3?' et al.':'');var bd=a.source==='PubMed'?'<span class="bdg pm">PubMed</span>':'<span class="bdg">bioRxiv</span>';var kh='';if(a.matched_keywords&&a.matched_keywords.length){kh='<div class="kws">';for(var k=0;k<a.matched_keywords.length;k++)kh+='<span class="kw">'+esc(a.matched_keywords[k])+'</span>';kh+='</div>';}var ab=a.abstract.length>400?a.abstract.slice(0,400)+'...':a.abstract;var sh='<div class="stars" id="ss'+i+'">';for(var s=1;s<=5;s++)sh+='<span class="star" onclick="rate('+i+','+s+')">&#9733;</span>';sh+='<span class="rlbl" id="sl'+i+'"></span></div>';o+='<div class="card" id="c'+i+'">';o+='<div class="num">Article '+(i+1)+' of '+ARTS.length+' - Score: '+a.score+'/100</div>';o+='<div class="ttl"><a href="'+esc(a.url)+'" target="_blank">'+esc(a.title)+'</a>'+bd+'</div>';o+='<div class="meta">'+esc(au)+' - '+esc(a.journal)+' '+esc(a.year)+'</div>';o+=kh+'<div class="abs">'+esc(ab)+'</div>'+sh+'</div>';}document.getElementById('msg').style.display='none';document.getElementById('arts').innerHTML=o;document.getElementById('btn').style.display='inline-block';document.getElementById('prog').textContent='0 of '+ARTS.length+' rated';}function rate(i,v){ratings[i]=v;var ss=document.querySelectorAll('#ss'+i+' .star');for(var s=0;s<ss.length;s++)ss[s].classList.toggle('on',s<v);document.getElementById('sl'+i).textContent=LABELS[v];document.getElementById('c'+i).classList.toggle('ok',v>=THR);document.getElementById('prog').textContent=Object.keys(ratings).length+' of '+ARTS.length+' rated';}function submitRatings(){var btn=document.getElementById('btn'),st=document.getElementById('st');btn.disabled=true;st.textContent='Saving...';var p=[];for(var i=0;i<ARTS.length;i++){var a=ARTS[i];p.push({doi:a.doi,title:a.title,journal:a.journal,year:a.year,authors:a.authors,url:a.url,source:a.source,score:a.score,rating:ratings[i]||null,in_digest:(ratings[i]||0)>=THR});}var c=btoa(unescape(encodeURIComponent(JSON.stringify(p,null,2))));var fp='data/ratings/'+DATE+'.json';var u='https://api.github.com/repos/'+REPO+'/contents/'+fp;var h={'Authorization':'token '+PAT,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};fetch(u,{headers:h}).then(function(r){return r.ok?r.json():null;}).then(function(x){var b={message:'ratings: '+DATE,content:c,branch:'main'};if(x&&x.sha)b.sha=x.sha;return fetch(u,{method:'PUT',headers:h,body:JSON.stringify(b)});}).then(function(r){if(r.ok){st.textContent='Saved!';btn.textContent='Saved';}else return r.json().then(function(e){throw new Error(e.message);});}).catch(function(e){st.textContent='Error: '+e.message;btn.disabled=false;});}fetch('https://alessandrodausilio.github.io/research-digest/rate/2026-03-18.json').then(function(r){return r.json();}).then(function(d){ARTS=d;render();}).catch(function(e){document.getElementById('msg').textContent='Error loading: '+e.message;});</script></body></html>
